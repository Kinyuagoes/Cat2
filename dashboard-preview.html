<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinKeeper | Analytical Ledger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-cyber sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="Startup.html"><i class="bi bi-cpu me-2"></i>COINKEEPER</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="Startup.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Architecture</a></li>
                    <li class="nav-item"><a class="nav-link" href="features.html">Rituals</a></li>
                    <li class="nav-item"><a class="nav-link" href="pricing.html">Tiers</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Journals</a></li>
                    <li class="nav-item"><a class="nav-link active" href="dashboard-preview.html">Ledger</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">Specs</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Access</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4">
            
            <div class="col-lg-6">
                <div class="glass-panel pt-4 h-100 d-flex flex-column justify-content-between">
                    <div class="px-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <i class="bi bi-chevron-left text-muted"></i>
                            <h5 class="fw-bold mb-0">Statistics</h5>
                            <i class="bi bi-three-dots-vertical text-muted"></i>
                        </div>

                        <div class="bg-dark rounded-3 p-1 d-flex mb-4" style="background-color: rgba(0,0,0,0.2) !important;">
                            <button class="btn btn-sm btn-neon-purple w-33 flex-fill py-2" style="border-radius:12px;">Week</button>
                            <button class="btn btn-sm text-muted w-33 flex-fill py-2">Month</button>
                            <button class="btn btn-sm text-muted w-33 flex-fill py-2">Year</button>
                        </div>

                        <div class="text-center my-4">
                            <span class="text-muted small d-block">Total Spending</span>
                            <h2 class="fw-bold">$2,760.00</h2>
                        </div>

                        <div class="d-flex justify-content-around small border-bottom border-secondary pb-2 mb-3">
                            <span class="text-muted">Income</span>
                            <span class="fw-bold text-white border-bottom border-2 border-info pb-2" style="margin-bottom:-10px;">Outcome</span>
                        </div>
                    </div>

                    <div class="wave-graph-container mt-auto">
                        <div class="text-center pt-3">
                            <span class="badge bg-dark text-cyan border border-info px-3 py-2" style="border-radius:12px; font-size:0.8rem; color:var(--neon-cyan);">-$1,360.00</span>
                        </div>
                        <svg viewBox="0 0 500 150" class="position-absolute bottom-0 w-100" style="height:110px;">
                            <path d="M0,80 C100,20 150,130 250,60 C350,0 400,90 500,40 L500,150 L0,150 Z" fill="rgba(0, 245, 212, 0.1)"></path>
                            <path d="M0,80 C100,20 150,130 250,60 C350,0 400,90 500,40" class="wave-line"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="glass-panel p-4 h-100">
                    <h5 class="fw-bold mb-4"><i class="bi bi-sliders me-2" style="color:var(--neon-purple);"></i>Resource Matrix Forecaster</h5>
                    <div class="mb-3">
                        <label class="form-label small text-muted-purple">Inflow Magnitude Profile ($)</label>
                        <input type="number" class="form-control form-cyber-input" id="calcIncome" value="5500">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted-purple">Fixed Variable Attrition ($)</label>
                        <input type="number" class="form-control form-cyber-input" id="calcExpenses" value="2100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted-purple">Target Reserve Target Bounds ($)</label>
                        <input type="number" class="form-control form-cyber-input" id="calcGoal" value="12000">
                    </div>
                    <button class="btn btn-neon-purple w-100 mt-2" id="calcBtn">Run Simulation Matrix</button>
                    <div id="calcFeedback" class="alert d-none mt-3"></div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
