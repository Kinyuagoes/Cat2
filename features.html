    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-cyber sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="Startup.html"><i class="bi bi-cpu me-2"></i>COINKEEPER</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="Startup.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Architecture</a></li>
                    <li class="nav-item"><a class="nav-link active" href="features.html">Rituals</a></li>
                    <li class="nav-item"><a class="nav-link" href="pricing.html">Tiers</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Journals</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard-preview.html">Ledger</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">Specs</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Access</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4 justify-content-center">
            
            <div class="col-md-5">
                <div class="glass-panel p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <i class="bi bi-chevron-left text-muted"></i>
                        <h5 class="fw-bold mb-0 text-center">Wallet</h5>
                        <i class="bi bi-three-dots-vertical text-muted"></i>
                    </div>

                    <div class="d-flex justify-content-around cyber-tabs mb-4">
                        <a href="#" class="cyber-tab-link active">Cards</a>
                        <a href="#" class="cyber-tab-link">Account</a>
                    </div>

                    <div class="my-4 position-relative">
                        <div class="premium-card-asset">
                            <div class="d-flex justify-content-between align-items-start mb-4">
                                <i class="bi bi-sim-fill fs-2 text-white-50"></i>
                                <i class="bi bi-wifi fs-4 text-white-50"></i>
                            </div>
                            <h4 class="fw-bold tracking-widest my-3">5000 0000 0000 0000</h4>
                            <div class="d-flex justify-content-between align-items-center mt-4">
                                <div>
                                    <span class="d-block text-white-50" style="font-size:0.6rem;">CARDHOLDER</span>
                                    <span class="small fw-bold">Sandy Chungus</span>
                                </div>
                                <div class="d-flex">
                                    <div class="rounded-circle bg-danger" style="width:25px; height:25px; margin-right:-10px; opacity:0.9;"></div>
                                    <div class="rounded-circle bg-warning" style="width:25px; height:25px; opacity:0.9;"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="text-center text-muted my-3 small">
                        <i class="bi bi-circle-fill mx-1 text-white" style="font-size:0.5rem;"></i>
                        <i class="bi bi-circle-fill mx-1" style="font-size:0.5rem;"></i>
                        <i class="bi bi-circle-fill mx-1" style="font-size:0.5rem;"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="glass-panel p-4 h-100">
                    <h5 class="fw-bold mb-4"><i class="bi bi-plus-circle me-2 text-info"></i>Add card</h5>
                    <span class="text-muted small d-block mb-4">Integrate external proxy debit parameters.</span>
                    
                    <div class="mb-3">
                        <label class="form-label small text-muted-purple">Card Number</label>
                        <input type="text" class="form-control form-cyber-input" placeholder="0000 0000 0000 0000">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted-purple">Cardholder name</label>
                        <input type="text" class="form-control form-cyber-input" placeholder="e.g. Benjamin Johnson">
                    </div>
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label small text-muted-purple">Expiration Date</label>
                            <input type="text" class="form-control form-cyber-input" placeholder="MM/YY">
                        </div>
                        <div class="col-6">
                            <label class="form-label small text-muted-purple">Security Code</label>
                            <input type="text" class="form-control form-cyber-input" placeholder="CVV">
                        </div>
                    </div>
                    <button class="btn btn-neon-purple w-100 mt-4">Initialize Token</button>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/min.js"></script>
    <script src="js/main.js"></script>
